<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Rock V4 - Quantum Pixel Visualizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px 30px;
            background: linear-gradient(90deg, #111 0%, #050505 100%);
            border-bottom: 2px solid #00ffcc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .title {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .status-bar {
            display: flex;
            gap: 20px;
        }

        .metric {
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 15px;
            border: 1px solid #00ffcc;
            border-radius: 4px;
            font-size: 1.1rem;
        }

        .main-container {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* The Left HUD for Nerves */
        .hud-panel {
            width: 300px;
            background: rgba(10, 10, 10, 0.9);
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 5;
        }

        .hud-title {
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .pipeline {
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .bar-container {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.1s linear;
        }

        .log-box {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.8rem;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .log-entry {
            margin-bottom: 4px;
            opacity: 0.8;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 0.8; transform: translateX(0); }
        }

        /* The Canvas Wrapper */
        .canvas-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }

        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
            max-width: 90%;
            max-height: 90%;
        }

        .overlay-text {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 10px #00ffcc;
        }

        .btn-stress {
            border-color: #ff3366;
            color: #ff3366;
        }
        .btn-stress:hover {
            background: rgba(255, 51, 102, 0.2);
            box-shadow: 0 0 10px #ff3366;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="title">Solo Rock V4 Matrix</div>
        <div class="status-bar">
            <div class="metric" id="cpu-metric">CPU: 4.2%</div>
            <div class="metric" id="ram-metric">RAM: 7.8GB</div>
            <div class="metric" id="lat-metric">LAT: 0.8ms</div>
            <div class="metric" style="color:#fff; border-color:#fff" id="fps-metric">FPS: 60</div>
        </div>
    </div>

    <div class="main-container">
        <!-- HUD Panel -->
        <div class="hud-panel">
            <div class="hud-title">ACTIVE PIPELINES</div>
            
            <div class="pipeline">
                <span>INPUT COMM (Teal)</span>
                <span id="p1-val">0%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="p1-bar" style="background:#00ffcc; width:0%"></div></div>

            <div class="pipeline">
                <span>TIMING (Pink)</span>
                <span id="p2-val">0%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="p2-bar" style="background:#ff00ff; width:0%"></div></div>

            <div class="pipeline">
                <span>PERFORMANCE (Red)</span>
                <span id="p3-val">0%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="p3-bar" style="background:#ff3333; width:0%"></div></div>

            <div class="pipeline">
                <span>RUNTIME (Blue)</span>
                <span id="p4-val">0%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="p4-bar" style="background:#3388ff; width:0%"></div></div>

            <div class="hud-title" style="margin-top: 20px;">EVENT BUS LOG</div>
            <div class="log-box" id="log-box">
                <div class="log-entry" style="color: #666;">System Initialized...</div>
            </div>
        </div>

        <!-- Visualizer Canvas -->
        <div class="canvas-wrapper">
            <div class="controls">
                <button onclick="setMode('idle')">IDLE</button>
                <button onclick="setMode('matrix')">MATH MATRIX</button>
                <button class="btn-stress" onclick="setMode('stress')">GTA 6 STRESS TEST</button>
            </div>
            <canvas id="pixelCanvas" width="1280" height="720"></canvas>
            <div class="overlay-text">Zero-Copy Buffer: ACTIVE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        // Use a smaller internal resolution to allow browser to render mathematical variance fast enough
        const W = 320; 
        const H = 180;
        
        // Scale canvas up via CSS
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.objectFit = 'contain';

        let imageData = ctx.createImageData(W, H);
        let data = new Uint32Array(imageData.data.buffer);

        let currentMode = 'idle';
        let frameCount = 0;
        let lastTime = performance.now();
        
        // Metrics state
        let cpu = 12.0;
        let ram = 7.8;
        let lat = 1.2;
        let logTick = 0;

        function addLog(msg, color="#00ffcc") {
            const box = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = color;
            entry.innerText = `[${logTick++}] ${msg}`;
            box.appendChild(entry);
            if(box.children.length > 20) {
                box.removeChild(box.firstChild);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            if(mode === 'matrix') addLog('Initiating Zero-Copy Pixel Enhancement...', '#fff');
            if(mode === 'stress') addLog('GTA 6 12-Thread Physics Override ACTIVE!', '#ff3366');
            if(mode === 'idle') addLog('System returned to idle state.', '#aaa');
        }

        function updateHUD() {
            // Simulate realistic metrics based on mode
            if (currentMode === 'idle') {
                cpu += (Math.random() * 2 - 1);
                cpu = Math.max(5, Math.min(20, cpu));
                lat = 0.5 + Math.random() * 0.5;
            } else if (currentMode === 'matrix') {
                cpu += (Math.random() * 5 - 2.5);
                cpu = Math.max(30, Math.min(60, cpu));
                lat = 1.2 + Math.random() * 0.8;
            } else if (currentMode === 'stress') {
                cpu += (Math.random() * 10 - 2);
                cpu = Math.max(85, Math.min(98, cpu)); // Heavy load
                lat = 2.5 + Math.random() * 2.0; // Still sub-5ms!
                
                if (Math.random() > 0.8) {
                    const depts = ['CERN', 'STIN', 'CAIN', 'PPVO', 'TSN', 'FSMF', 'PDEC', 'SCCN'];
                    const d = depts[Math.floor(Math.random()*depts.length)];
                    addLog(`[${d}] Event Trigger: ${Math.floor(Math.random()*99999)}`, '#aaa');
                }
            }

            document.getElementById('cpu-metric').innerText = `CPU: ${cpu.toFixed(1)}%`;
            document.getElementById('lat-metric').innerText = `LAT: ${lat.toFixed(2)}ms`;

            // Update Pipeline bars
            const loadFactor = currentMode === 'stress' ? 90 : (currentMode === 'matrix' ? 50 : 10);
            
            for(let i=1; i<=4; i++) {
                let val = Math.min(100, Math.max(0, loadFactor + (Math.random() * 20 - 10)));
                document.getElementById(`p${i}-val`).innerText = `${val.toFixed(0)}%`;
                document.getElementById(`p${i}-bar`).style.width = `${val}%`;
            }
        }

        function renderFrame() {
            const now = performance.now();
            const dt = now - lastTime;
            lastTime = now;
            
            // FPS calculation
            if(frameCount % 10 === 0) {
                document.getElementById('fps-metric').innerText = `FPS: ${Math.round(1000/dt)}`;
            }
            frameCount++;

            const time = now * 0.001;

            if (currentMode === 'idle') {
                // Subtle static/black
                for (let i = 0; i < W * H; i++) {
                    const noise = Math.random() > 0.99 ? 20 : 5;
                    data[i] = 0xFF000000 | (noise << 16) | (noise << 8) | noise;
                }
            } 
            else if (currentMode === 'matrix') {
                // Mathematical Color Variance (Every Pixel Unique)
                let offset = Math.floor(time * 50);
                for (let y = 0; y < H; y++) {
                    for (let x = 0; x < W; x++) {
                        // Simulating the bitwise logic from the python script
                        let r = ((x+offset) * 255 / W) ^ (y * 255 / H);
                        let g = (x ^ (y+offset)) % 256;
                        let b = (x * y) % 256;
                        // 0xAABBGGRR
                        data[y * W + x] = 0xFF000000 | (b << 16) | (g << 8) | r;
                    }
                }
            }
            else if (currentMode === 'stress') {
                // Hyper-speed data streaming simulating GTA 6 load
                for (let y = 0; y < H; y++) {
                    for (let x = 0; x < W; x++) {
                        let intensity = (Math.sin(x*0.1 + time*10) + Math.cos(y*0.1 - time*8)) * 128 + 128;
                        let r = intensity > 200 ? 255 : (intensity * 0.5);
                        let b = Math.random() > 0.9 ? 255 : 0; // Random data spikes
                        data[y * W + x] = 0xFF000000 | (b << 16) | (Math.floor(r*0.2) << 8) | Math.floor(r);
                    }
                }
                
                // Draw a sweeping "physics scanner" line
                let scanY = Math.floor((time * 200) % H);
                for (let x = 0; x < W; x++) {
                    data[scanY * W + x] = 0xFFFFFFFF; // Pure white sweep
                }
            }

            // Blast memory to canvas (Zero-Copy simulation)
            ctx.putImageData(imageData, 0, 0);

            // 144hz UI update rate roughly
            if (frameCount % 6 === 0) updateHUD();

            requestAnimationFrame(renderFrame);
        }

        // Initialize
        addLog('V4 Registry Mounted.');
        addLog('2,400 Nerves Discovered.');
        addLog('Zero-Copy Frame Buffer Acquired.');
        requestAnimationFrame(renderFrame);
        setInterval(updateHUD, 500);

    </script>
</body>
</html>
