[pytest]
# SOLO ROCK pytest configuration

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when running with pytest-cov)
# Run with: pytest --cov=central_command,diagnostics,hardware_drivers,config --cov-report=html

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    slow: Tests that take a long time to run
    config: Configuration system tests
    decision: Decision engine tests
    hardware: Hardware reader tests
    diagnostics: Diagnostics engine tests
    cli: CLI command tests

# Timeout for tests (in seconds) - prevents hanging tests
timeout = 30

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
